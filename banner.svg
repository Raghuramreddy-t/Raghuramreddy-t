<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#070B14"/>
<stop offset="100%" stop-color="#111827"/>
</linearGradient>

<linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#22D3EE"/>
<stop offset="50%" stop-color="#4F7CFF"/>
<stop offset="100%" stop-color="#8B5CF6"/>
</linearGradient>

<radialGradient id="glowBlue">
<stop offset="0%" stop-color="#22D3EE"/>
<stop offset="100%" stop-color="#0B1020"/>
</radialGradient>

<radialGradient id="glowPurple">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="100%" stop-color="#0B1020"/>
</radialGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="10"/>
</filter>

<style>

.title {
font: 700 62px 'Segoe UI', sans-serif;
fill: #F8FAFC;
letter-spacing: 1px;
}

.subtitle {
font: 500 22px 'Segoe UI', sans-serif;
fill: #CBD5E1;
}

.identity {
font: 700 36px 'Segoe UI', sans-serif;
fill: #F8FAFC;
}

.small {
font: 500 18px 'Segoe UI', sans-serif;
fill: #94A3B8;
letter-spacing: 1.5px;
}

.node {
font: 700 14px 'Segoe UI', sans-serif;
fill: #E2E8F0;
letter-spacing: 2px;
}

.url {
font: 700 18px 'Segoe UI', sans-serif;
fill: #F8FAFC;
}

</style>

</defs>

<!-- background -->

<rect width="1600" height="500" fill="url(#bg)"/>

<!-- atmospheric gradients -->

<circle cx="1350" cy="120" r="220" fill="url(#glowPurple)" opacity="0.25" filter="url(#blur)"/>

<circle cx="1180" cy="320" r="240" fill="url(#glowBlue)" opacity="0.18" filter="url(#blur)"/>

<circle cx="250" cy="120" r="180" fill="url(#glowBlue)" opacity="0.12" filter="url(#blur)"/>

<!-- subtle grid -->

<g opacity="0.05">

<path d="M0 100H1600"/>
<path d="M0 200H1600"/>
<path d="M0 300H1600"/>
<path d="M0 400H1600"/>

<path d="M200 0V500"/>
<path d="M400 0V500"/>
<path d="M600 0V500"/>
<path d="M800 0V500"/>
<path d="M1000 0V500"/>
<path d="M1200 0V500"/>
<path d="M1400 0V500"/>

</g>

<!-- cognition symbol -->

<circle cx="180" cy="170" r="70"
fill="#0F172A"
stroke="#334155"
stroke-width="2"/>

<circle cx="180" cy="170" r="28"
fill="#22D3EE"/>

<circle cx="180" cy="170" r="10"
fill="#F8FAFC"/>

<!-- signal waves -->

<path d="
M980 260
C1100 180 1220 340 1360 250
C1450 200 1500 280 1600 220"
stroke="url(#line)"
stroke-width="4"
stroke-linecap="round"
opacity="0.9"/>

<path d="
M950 300
C1100 240 1260 360 1450 280"
stroke="#22D3EE"
stroke-width="1.5"
opacity="0.25"/>

<!-- typography -->

<text x="320" y="160" class="title">
Raghuramreddy
</text>

<text x="320" y="205" class="subtitle">
Designing technology for human experience
</text>

<line
x1="320"
y1="235"
x2="760"
y2="235"
stroke="url(#line)"
stroke-width="3"
stroke-linecap="round"/>

<text x="320" y="300" class="identity">
Intelligent Infrastructure Ecosystems
</text>

<text x="320" y="345" class="small">
Operational Intelligence • Lifecycle Governance • Infrastructure Cognition
</text>

<!-- flow -->

<g transform="translate(980 120)">

<circle cx="0" cy="0" r="38" fill="#13203A"/>
<circle cx="0" cy="0" r="14" fill="#22D3EE"/>

<circle cx="170" cy="0" r="38" fill="#13203A"/>
<circle cx="170" cy="0" r="14" fill="#22D3EE"/>

<circle cx="340" cy="0" r="38" fill="#13203A"/>
<circle cx="340" cy="0" r="14" fill="#22D3EE"/>

<circle cx="510" cy="0" r="38" fill="#1E1B4B"/>
<circle cx="510" cy="0" r="14" fill="#8B5CF6"/>

<line
x1="38"
y1="0"
x2="132"
y2="0"
stroke="#334155"
stroke-width="2"/>

<line
x1="208"
y1="0"
x2="302"
y2="0"
stroke="#334155"
stroke-width="2"/>

<line
x1="378"
y1="0"
x2="472"
y2="0"
stroke="#334155"
stroke-width="2"/>

<text x="-52" y="82" class="node">
INFRASTRUCTURE
</text>

<text x="130" y="82" class="node">
SIGNALS
</text>

<text x="280" y="82" class="node">
INTELLIGENCE
</text>

<text x="445" y="82" class="node">
HUMAN CONTROL
</text>

</g>

<!-- philosophy -->

<text x="980" y="420"
font-family="Segoe UI"
font-size="18"
fill="#CBD5E1">
AI assists. Engineers decide.
</text>

<!-- website -->

<rect
x="1210"
y="395"
width="260"
height="48"
rx="14"
fill="#0F172A"
stroke="#334155"/>

<text
x="1340"
y="425"
text-anchor="middle"
class="url">
raghuramreddy.tech
</text>

</svg>
